name: evento_app
description: "A new Flutter project."
publish_to: 'none'
version: 9.0.0+9

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.10.0
  animations: ^2.1.0
  flutter_svg: ^2.2.1
  expandable_text: ^2.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_staggered_animations: ^1.1.1
  flutter_launcher_icons: ^0.14.4
  pinput: ^5.0.2
  provider: ^6.1.2
  get: ^4.7.2
  http: ^1.2.0
  flutter_html: ^3.0.0
  webview_flutter: ^4.8.0
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  geolocator: ^14.0.2
  geocoding: ^2.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.5
  file_picker: ^10.3.3
  flutter_local_notifications: ^19.5.0
  firebase_messaging: ^15.1.2
  firebase_core: ^3.6.0
  firebase_analytics: ^11.0.0
  flutter_stripe: ^12.0.2
  razorpay_flutter: ^1.3.7
  flutter_cached_pdfview: ^0.4.3
  url_launcher: ^6.3.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/Inter_18pt-Regular.ttf
        - asset: assets/fonts/Inter/Inter_18pt-Medium.ttf
        - asset: assets/fonts/Inter/Inter_18pt-SemiBold.ttf
        - asset: assets/fonts/Inter/Inter_18pt-Bold.ttf
        - asset: assets/fonts/Inter/Inter_24pt-SemiBold.ttf

flutter_launcher_icons:
  image_path: "assets/icons/icon.png"
  android: true
  ios: true
  adaptive_icon_background: "assets/icons/bg.png"
  background_color_ios: "#ffffff"